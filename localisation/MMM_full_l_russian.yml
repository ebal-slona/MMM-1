 # Трейты лидеров
 trait_Valeriy_Minkov: "Отец всея Мытищ"
 trait_Valeriy_Minkov_desc: "+50% защита от смены идеологии, +15% атака и +15% защита на национальных территориях, +10% прирост политической власти"

 trait_Georgiy_Bril_Romanov: "Монарх-эстет"
 trait_Georgiy_Bril_Romanov_desc: "+15% фабрики народного потребления, +10 стабильности"

 trait_Anton_Tikhanskiy: "Наместник Ленина на Земле"
 trait_Anton_Tikhanskiy_desc: "+0.15 поддержка коммунизма в день, +15% скорость строительства фабрик, +10% поддержка войны"

 trait_Pavel_Voronin: "Гроза Бишкека"
 trait_Pavel_Voronin_desc: "+50 к улучшенному мнению со странами Азии 1936 года, +10% поддержка войны, +1% рост населения не национальных регионов, +10% скорость дивизий"

 trait_Nikolay_Nekrasov: "Привязанный к дереву"
 trait_Nikolay_Nekrasov_desc: "-10% атака дивизий, +15% оборона дивизий, +10% планирование, +20% поддержка войны"

 trait_Igor_Molodtsov: "Демократ с уклоном вправо"
 trait_Igor_Molodtsov_desc: "+20% скорость строительства, -20% стабильность, +3 ячейки оперативников, -15% время улучшения агентов"

 # Национальные духи
 spirit_centralized_government: "Централизованное управление"
 spirit_centralized_government_desc: "+10% скорость производства"

 spirit_tikhanskiy_conspiracy: "Заговор Тиханского"
 spirit_tikhanskiy_conspiracy_desc: "-15% прирост политической власти, -20% стабильность"

 spirit_war_destroying_country: "Война, которая уничтожит страну"
 spirit_war_destroying_country_desc: "-30% военнообязанное население, -40% поддержка войны, +50% стоимость сухопутных доктрин"

 spirit_broken_economy: "Разрушенная экономика"
 spirit_broken_economy_desc: "-15% скорость строительства, -15% заводское производство, +50% затраты на законы о торговле и экономике"
 
 MMM_search_voznesenskaya: "Обыск на Вознесенской улице"
 MMM_search_voznesenskaya_desc: "Провести обыск у Георгия Бриля. В течение 60 дней +10% фабрики народного потребления, еженедельное снижение стабильности -0.05. Стоимость: 25 политической власти."

 MMM_show_trial_georgiy: "Показательный суд над лжемонархом"
 MMM_show_trial_georgiy_desc: "Провести судебный процесс над Георгием Брилем. Длительность 60 дней, стоимость 150 политической власти. По завершении Георгий отправляется в тюрьму, стабильность -10%, у Валерия Минькова увеличивается защита от смены идеологии."

 MMM_fabricate_suicide: "Подстроить суицид русского самодержца"
 MMM_fabricate_suicide_desc: "Организовать смерть Георгия Бриля под видом естественного события. Стоимость 300 политической власти, длительность 30 дней."

 MMM_georgiy_exile_title: "Монарх Георгий Бриль-Романов пожизненно усажен в мытищинской тюрьме"
 MMM_georgiy_exile_desc: "После показательного суда Георгий Бриль отправлен в тюрьму на территории Мытищ."
 MMM_georgiy_exile_option: "Принять"

 MMM_georgiy_thrombosis_title: "У Бриля после дневной прогулки оторвался тромб"
 MMM_georgiy_thrombosis_desc: "Внезапная смерть Георгия Бриля вызвала много слухов и недовольства."
 MMM_georgiy_thrombosis_option: "Принять"

 MMM_georgiy_poisoning_takeover_title: "Захват власти Георгием Брилем"
 MMM_georgiy_poisoning_takeover_desc: "Прошло 150 дней, а Валерий Миньков не посадил Георгия Бриля в тюрьму. Бриль организовал отравление Минькова палёной водкой и захватил власть."
 MMM_georgiy_poisoning_takeover_option: "Принять"
 ### Категория решений
  MMM_parliament_category: "Политические решения Думы"
  MMM_parliament_category_desc: "Дума Унитарных Мытищ постоянно вовлечена в интриги и борьбу за власть. Поддержка разных фракций влияет на будущее страны."

  ### Решения парламента
  MMM_boost_fascists: "Увеличить влияние фашистов"
  MMM_boost_fascists_desc: "Пора дать слово сильной руке! Поддержим фашистских депутатов."

  MMM_boost_communists: "Увеличить влияние коммунистов"
  MMM_boost_communists_desc: "Только коллективизм спасёт Мытищи. Поддержим товарищей."

  MMM_boost_democrats: "Увеличить влияние демократов"
  MMM_boost_democrats_desc: "Свобода, равенство, мытищенское братство. Демократы заслуживают голос."

  MMM_boost_neutrality: "Увеличить влияние центра"
  MMM_boost_neutrality_desc: "Прагматики в центре должны удерживать баланс. Укрепим их влияние."

  MMM_neutrality_falls: "Крах центра: гражданская война"
  MMM_neutrality_falls_desc: "Центр теряет контроль — страна на грани раскола. Стороны готовятся к войне."

  ### Георгиевский цикл
  MMM_search_voznesenskaya: "Обыск на Вознесенской улице"
  MMM_search_voznesenskaya_desc: "По наводке Охранки, на Вознесенской припрятаны народные запасы золота. Проведём обыск."

  MMM_show_trial_georgiy: "Показательный суд над лжемонархом"
  MMM_show_trial_georgiy_desc: "Вся Дума требует справедливости. Георгий предстанет перед честным и справедливым судом."

  MMM_fabricate_suicide: "Инсценировать суицид самодержца"
  MMM_fabricate_suicide_desc: "Монархов не судят — они исчезают. Пора завершить дело Георгия."
