l_russian:
 # Решения парламента
 MMM_parliament_decisions: "Управление парламентом"
 MMM_boost_neutrality: "Поддержать центристов"
 MMM_boost_neutrality_desc: "Расширить влияние центристской партии в Госдуме."
 MMM_boost_fascists: "Поддержать Национальный авангард"
 MMM_boost_fascists_desc: "Финансировать их митинги и увеличить число мандатов в парламенте."
 MMM_boost_communists: "Поддержать Красное Возрождение"
 MMM_boost_communists_desc: "Коммунистические активисты набирают силу в парламенте."
 MMM_boost_democrats: "Поддержать Демократических реформаторов"
 MMM_boost_democrats_desc: "Демократическим голосам нужна легитимность и финансирование."
 MMM_neutrality_falls: "Крах центристов"
 MMM_neutrality_falls_desc: "Центристы утратили большинство в парламенте. Страна стоит на пороге новой гражданской войны."

