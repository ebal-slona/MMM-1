 MMM_GATHERING_STORM_NAME: "Судьба Унитарных Мытищ"
 MMM_GATHERING_STORM_DESC: "После того, как гражданская война на равнинах бывшей Российской империи закончилась, не все смирились с поражением от большевиков. Небольшие силы белых свергли Красный террор, и под предводительством молодого политика Валерия Минькова вышли из подполья и отвоевали себе большую часть юга России. Но не все считают легитимным как само государство, так и и ее лидера..."