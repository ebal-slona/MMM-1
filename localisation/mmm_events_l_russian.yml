l_russian:
 news.MMM_kulek.t: "KULEK"
 news.MMM_kulek.desc: "В самом сердце столицы открылось интересное заведение с оригинальной подачей кофе. Этот необычный стиль уже разлетелся по иностранным новостям, в которых выражают восторг дизайном, и непременно хотят отведать его. Государь лично оценил сие заведение."
 news.MMM_kulek.a: "Такое нам нравится"
 MMM.2.t: "Восстание монархистов!"
 MMM.2.desc: "после неудачных попыток избавиться от Георгия, Валерий обрел страну на вторую гражданскую фойну за стольк недолгое существование государства"
 MMM.2.a: "Начать"