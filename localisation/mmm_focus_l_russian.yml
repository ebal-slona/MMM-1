l_russian:
 MMM_mytischy_war_lore: "Когда пыль улеглась"
 MMM_mytischy_war_lore_desc: "Теперь, когда Мытищи стали независимыми, пора определиться, как развивать нашу страну"
 MMM_mytischy_war_lore1: "Обратить свой взор налево"
 MMM_mytischy_war_lore1_desc: "Казалось, что Миньков знает, куда вести нашу страну, но это не так. Пора вернуть устоявшиеся в обществе учения Маркса и Ленина!"
 MMM_mytischy_war_lore2: "Демократизация страны"
 MMM_mytischy_war_lore2_desc: "Эпоха военных у власти затянулась, пора нашей стране развиваться соответсвуя требованиям времени"
 MMM_mytischy_war_lore3: "Прогматичный курс"
 MMM_mytischy_war_lore3_desc: "Нельзя дать смуте посеять сомнения в правильности нашего пути, однако, не обязательно нужна такая жесткая рука правительства..."
 MMM_mytischy_war_lore4: "Правосторонние идеалы"
 MMM_mytischy_war_lore4_desc: "Миньков абсолютно не способен вывести страну из кризиса, необходимо более тотальное правление и не такая вялая рука руководства"
 MMM_mytischy_war_lore5: "Остаться верным Минькову"
 MMM_mytischy_war_lore5_desc: "Миньков - живое подтверждение, что наша страна - имеет право на существоание. Предать его сейчас - просто преступно для всего гсоударства"
 MMM_mytischy_war_lore6: "Королевский род Бриль"
 MMM_mytischy_war_lore6_desc: "Необходимо вспомнить, а почему вообще началась эта ужасная война? Не было ли изначальной целью розыскать и восстановить подлинного законного монарха? Диктатор предал эту идею, и сейчас не время ему это спустить с рук!"
 MMM_repair_infrastructure: "Востановить нашу инфраструктуру"
 MMM_repair_infrastructure_desc: "После войны за свободу нашего народа было уничтожено много объектов инфраструктуры. Пора ее восстановить"
 MMM_heavy_indusrty: "Построить фабрики"
 MMM_heavy_indusrty_desc: "Необходимы дополнительные заводы для продовольствия нации!"
 MMM_researching_new_oilwell: "Новая нефтяные скважины"
 MMM_researching_new_oilwell_desc: "Как и любая другая страна 20 века, Мытищам позарез необходима нефть"
 MMM_army_reforms: "Реформирование армии"
 MMM_army_reforms_desc: "Наша армия далека от передовых армий планеты, необходимо это исправить"
 MMM_end_the_first_modernisation_stage: "Завершить первый этап модернизации"
 MMM_end_the_first_modernisation_stage_desc: "Война тяжело отразилась на нашей экономике, но теперь худшее позади"
 MMM_railways_modernisation: "Реорганизация железной дороги"
 MMM_railways_modernisation_desc: "Железные пути - не исключение из списка того, что необходимого восстановить практически с нуля"
 MMM_brils_bank: "Банк королевской семьи Бриль"
 MMM_brils_bank_desc: "Георгий Бриль, несмотря на то, что находится в опале, помогает государству частными займами и кредитами, чтобы восстановить экономику Мытищ"
 MMM_open_new_factories: "Открыть забытые военные заводы"
 MMM_open_new_factories_desc: "Враги не дремлют. Необходимо готовить страну к защите"
 MMM_expand_factories: "Расширение военпрома"
 MMM_expand_factories_desc: "Учитывая ошибки прошлого, страна уже поплатилась за то, что была не подготовлена к новым войнам"
 MMM_devolvation_of_rubl: "Девальвация Рубля"
 MMM_devolvation_of_rubl_desc: "С отречением от советской системы возникла необходисомть собственной, сильной валюты для процветания Родины"
 MMM_researching_new_depositums_of_aliminium: "Раскопки алюминия"
 MMM_researching_new_depositums_of_aliminium_desc: "Алюминий - ценный металл, который поможет нашей великой стране встать на ноги"
 MMM_research_slot_1: "Новые НИИ в области инженерии"
 MMM_research_slot_1_desc: "Наука - важнейший аспект развития"
 MMM_new_technologies: "Изобретения мытищенских ученых"
 MMM_new_technologies_desc: "Мытищи всегда славились своими гениальными учеными"
 MMM_more_steel: "Разведка стальных месторождений"
 MMM_more_steel_desc: "Важднейший металл в производстве необходим как никогда"
 MMM_radio_mytischy_fm: "Радиостанция "Мытищи FM""
 MMM_radio_mytischy_fm_desc: "Наш народ должен получать важную информацию сразу, качественно и из достоверных источников"
 MMM_nature_transformation: "Преобразование природы"
 MMM_nature_transformation_desc: "Гении мысли наших цехов ведут страну вперед"
 MMM_econimic_resurrection: "Воскрешение экономики"
 MMM_econimic_resurrection_desc: "После удачных реформ и преобразований экономика Мытищ наконец то восстановлена!"
 MMM_mytischy_the_air_force: "Реформа ВВС"
 MMM_mytischy_the_air_force_desc: "Превосходство в воздухе - важных аспект войн 20 века"
 MMM_flying_school: "Открытие новых летных училищ"
 MMM_flying_school_desc: "Качественная подкотовка летчиков - наименьше количество случайных происшествий в небе"
 MMM_new_planes: "Новые модели самолетов"
 MMM_new_planes_desc: "Модернизация воздушных суден просто необходимо"
 MMM_new_air_bases: "Открытие новых авиабаз"
 MMM_new_air_bases_desc: "Чем больше - тем лучше!"
